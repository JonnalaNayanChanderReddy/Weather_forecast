<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌦️ Weather App</h2>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <button type="submit">Check</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if weather %}
        <h3>{{ weather.city }}</h3>
        <p>🌡 Temperature: {{ weather.temp }} °C</p>
        <p>🤗 Feels Like: {{ weather.feels }} °C</p>
        <p>💧 Humidity: {{ weather.humidity }}%</p>
        <p>☁ Condition: {{ weather.condition }}</p>
    {% endif %}

</div>

</body>
</html>
